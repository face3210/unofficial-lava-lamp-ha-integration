---
name: "Bug report"
description: "Report a bug with the Unofficial Lava Lamp integration"
body:
  - type: markdown
    attributes:
      value: Before you open a new issue, search through the existing issues to see if others have had the same problem.
  - type: textarea
    attributes:
      label: "System Health details"
      description: "Paste the data from the System Health card in Home Assistant (https://www.home-assistant.io/more-info/system-health#github-issues)."
    validations:
      required: true
  - type: checkboxes
    attributes:
      label: Checklist
      options:
        - label: I have enabled debug logging for my installation.
          required: true
        - label: I have filled out the issue template to the best of my ability.
          required: true
        - label: This issue only contains 1 issue. If you have multiple issues, open one issue for each issue.
          required: true
        - label: This issue is not a duplicate issue of any previous issues.
          required: true
  - type: textarea
    attributes:
      label: "Describe the issue"
      description: "A clear and concise description of what the issue is."
    validations:
      required: true
  - type: textarea
    attributes:
      label: Reproduction steps
      description: "Without steps to reproduce, it will be hard to fix."
      value: |
        1.
        2.
        3.
        ...
    validations:
      required: true
  - type: textarea
    attributes:
      label: "Debug logs"
      description: "Include everything from Home Assistant startup to the point where you encounter the issue."
      render: text
    validations:
      required: true
  - type: textarea
    attributes:
      label: "Diagnostics dump"
      description: "Drag the diagnostics dump file here, if available. See https://www.home-assistant.io/integrations/diagnostics/ for info."
