# Based on Home Assistant Core's Ruff configuration.

target-version = "py312"

[lint]
select = [
    "ALL",
]

ignore = [
    "ANN401", # Dynamically typed expressions (typing.Any) are disallowed
    "D203", # no-blank-line-before-class (incompatible with formatter)
    "D212", # multi-line-summary-first-line (incompatible with formatter)
    "COM812", # incompatible with formatter
    "ISC001", # incompatible with formatter
]

[lint.flake8-pytest-style]
fixture-parentheses = false

[lint.pyupgrade]
keep-runtime-typing = true

[lint.mccabe]
max-complexity = 25

[lint.per-file-ignores]
"custom_components/lava_lamp/*.py" = [
    "D101", # Missing docstring in public class
    "D102", # Missing docstring in public method
    "D107", # Missing docstring in __init__
    "EM101", # Exception must not use a string literal
    "EM102", # Exception must not use an f-string literal
    "TC001", # Move first-party imports into a type-checking block
    "TC002", # Move third-party imports into a type-checking block
    "TC003", # Move standard-library imports into a type-checking block
    "TRY003", # Avoid specifying long messages outside the exception class
]
"tests/**/*.py" = [
    "D100", # Missing docstring in public module
    "D103", # Missing docstring in public function
    "INP001", # Implicit namespace package
    "PLR2004", # Magic value used in comparison
    "PT011", # pytest.raises too broad
    "S101", # Use of assert
]
